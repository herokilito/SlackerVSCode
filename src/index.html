<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;" />
  <title>Visual Studio Code</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Custom title bar (draggable) with menu -->
  <div id="titlebar">
    <div class="tb-left">
      <span class="tb-logo" id="tbLogo"></span>
      <span class="tb-title" id="tbTitle">Visual Studio Code</span>
      <nav id="menubar" class="menubar"></nav>
    </div>
    <div class="tb-center"></div>
    <div class="tb-right">
      <div class="win-controls">
        <button class="wc wc-min" id="wcMin" title="Minimize"></button>
        <button class="wc wc-max" id="wcMax" title="Maximize"></button>
        <button class="wc wc-close" id="wcClose" title="Close"></button>
      </div>
    </div>
  </div>

  <div id="body">
    <!-- Activity Bar -->
    <div id="activitybar">
      <div class="ab-top" id="abTop"></div>
      <div class="ab-bottom" id="abBottom"></div>
    </div>

    <!-- Side Bar -->
    <div id="sidebar">
      <!-- Explorer panel -->
      <div id="explorerPanel" class="sb-panel">
        <div class="sb-header">
          <span id="sbTitle">EXPLORER</span>
          <span class="sb-actions" id="sbActions"></span>
        </div>
        <div class="sb-section-label">WORKSPACE</div>
        <div id="bookshelf" class="bookshelf"></div>
      </div>
      <!-- Search panel (hidden by default) -->
      <div id="searchPanel" class="sb-panel hidden">
        <div class="sb-header">
          <span>SEARCH</span>
        </div>
        <div class="search-body">
          <div class="search-input-wrap">
            <div class="search-input-row">
              <span class="search-icon" id="searchIcon"></span>
              <input id="searchInput" class="search-input" placeholder="搜索当前小说" autocomplete="off" />
              <span class="search-count" id="searchCount"></span>
            </div>
            <div class="search-sub">
              <span class="search-detail" id="searchDetail">搜索当前打开的小说</span>
            </div>
          </div>
          <div id="searchResults" class="search-results"></div>
        </div>
      </div>
    </div>

    <!-- Sash / resizer -->
    <div id="sash"></div>

    <!-- Editor area -->
    <div id="editorArea">
      <div id="tabs" class="tabs"></div>
      <div id="breadcrumbs" class="breadcrumbs"></div>
      <div id="editorScroll" class="editor-scroll">
        <div id="editor" class="editor">
          <!-- Welcome / empty state -->
          <div id="welcome" class="welcome">
            <div class="welcome-inner">
              <div class="welcome-logo" id="welcomeLogo"></div>
              <h1>Visual Studio Code</h1>
              <p class="welcome-sub">Editing evolved</p>
              <div class="welcome-actions">
                <button class="wa" data-act="open">Open a Novel…</button>
                <button class="wa" data-act="clone">Clone from library…</button>
              </div>
              <p class="welcome-tip">Tip: 按下 Ctrl+P 快速跳转章节</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <div class="sb-left" id="statusLeft"></div>
    <div class="sb-right" id="statusRight"></div>
  </div>

  <!-- Quick open palette (Ctrl+P) -->
  <div id="quickOpen" class="quick-open hidden">
    <input id="qoInput" class="qo-input" placeholder="按名称搜索章节…" autocomplete="off" />
    <div id="qoList" class="qo-list"></div>
  </div>

  <!-- Menu dropdown layer -->
  <div id="menuLayer" class="menu-layer hidden"></div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="icons.js"></script>
  <script src="disguise.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
